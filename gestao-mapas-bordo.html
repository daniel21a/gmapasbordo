<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mapas de Bordo — Gestão de Pagamentos</title>
<style>
  :root{
    --navy-deep:#0A2233;
    --navy-mid:#123B57;
    --navy-card:#15435F;
    --brass:#C9A44C;
    --brass-dim:#8f7534;
    --coral:#D1543E;
    --foam:#EDE6D6;
    --foam-dim:#B9C4C9;
    --teal:#5C8A99;
    --line:rgba(237,230,214,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, #164764 0%, var(--navy-deep) 55%),
      var(--navy-deep);
    color:var(--foam);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  .wrap{max-width:520px; margin:0 auto; padding:20px 16px 0;}

  /* ===== Header ===== */
  header{padding:8px 0 20px; border-bottom:1px solid var(--line); margin-bottom:20px; position:relative;}
  .eyebrow{
    font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace;
    font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--brass); opacity:0.85; margin-bottom:6px;
  }
  h1{
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-weight:700; font-size:26px; margin:0 0 4px; color:var(--foam);
    letter-spacing:0.2px;
  }
  .subtitle{font-size:13px; color:var(--foam-dim);}
  .anchor-mark{
    position:absolute; top:6px; right:0; font-size:22px; opacity:0.35;
  }

  /* ===== Dashboard ===== */
  .dash{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px;}
  .dcard{
    background:linear-gradient(160deg, var(--navy-card), var(--navy-mid));
    border:1px solid var(--line);
    border-radius:10px; padding:14px 14px 12px;
  }
  .dcard .label{font-size:10.5px; text-transform:uppercase; letter-spacing:1.2px; color:var(--foam-dim); margin-bottom:6px;}
  .dcard .value{
    font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace;
    font-size:22px; font-weight:600; color:var(--brass);
  }
  .dcard.alert .value{color:var(--coral);}
  .dcard .sub{font-size:11px; color:var(--foam-dim); margin-top:2px;}

  /* ===== Toolbar ===== */
  .toolbar{display:flex; gap:8px; margin-bottom:16px;}
  input.search{
    flex:1; background:var(--navy-mid); border:1px solid var(--line); border-radius:8px;
    padding:11px 12px; color:var(--foam); font-size:14px; outline:none;
  }
  input.search::placeholder{color:var(--foam-dim);}
  input.search:focus{border-color:var(--brass);}
  button.new-btn{
    background:var(--brass); color:var(--navy-deep); border:none; border-radius:8px;
    padding:0 16px; font-weight:700; font-size:20px; cursor:pointer; line-height:1;
  }
  button.new-btn:active{transform:scale(0.96);}

  /* ===== Client list ===== */
  .empty{text-align:center; padding:50px 20px; color:var(--foam-dim);}
  .empty .big{font-size:34px; margin-bottom:10px;}
  .client-card{
    background:var(--navy-card); border:1px solid var(--line); border-radius:12px;
    padding:14px 15px; margin-bottom:12px; cursor:pointer;
  }
  .client-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .client-name{font-weight:700; font-size:15.5px; color:var(--foam);}
  .client-owner{font-size:12.5px; color:var(--foam-dim); margin-top:2px;}
  .badge{
    font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; white-space:nowrap;
    font-family: ui-monospace, monospace;
  }
  .badge.ok{background:rgba(201,164,76,0.18); color:var(--brass);}
  .badge.debt{background:rgba(209,84,62,0.18); color:var(--coral);}

  /* tide strip - signature element */
  .tide{display:flex; gap:3px; margin-top:12px; align-items:flex-end;}
  .knot{
    flex:1; height:16px; border-radius:3px; position:relative;
    background:rgba(237,230,214,0.06);
    border:1px solid rgba(237,230,214,0.15);
  }
  .knot.paid{background:var(--brass); border-color:var(--brass);}
  .knot.unpaid{background:rgba(209,84,62,0.25); border-color:var(--coral);}
  .knot.future{opacity:0.25;}
  .tide-labels{display:flex; justify-content:space-between; font-size:9px; color:var(--foam-dim); margin-top:4px; font-family:ui-monospace,monospace;}

  /* ===== Modal ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(5,15,25,0.72); display:none;
    align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--navy-mid); width:100%; max-width:520px; border-radius:18px 18px 0 0;
    padding:22px 18px calc(22px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
    border-top:1px solid var(--line);
  }
  .sheet h2{
    font-family:Georgia, serif; font-size:19px; margin:0 0 16px; color:var(--foam);
  }
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:11.5px; color:var(--foam-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px;}
  .field input{
    width:100%; background:var(--navy-deep); border:1px solid var(--line); border-radius:8px;
    padding:11px 12px; color:var(--foam); font-size:15px; outline:none;
  }
  .field input:focus{border-color:var(--brass);}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .sheet-actions{display:flex; gap:10px; margin-top:18px;}
  .btn{
    flex:1; padding:13px; border-radius:9px; border:none; font-weight:700; font-size:14.5px; cursor:pointer;
  }
  .btn.primary{background:var(--brass); color:var(--navy-deep);}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--foam-dim);}
  .btn.danger{background:rgba(209,84,62,0.15); color:var(--coral); border:1px solid rgba(209,84,62,0.3);}
  .close-x{
    position:absolute; top:16px; right:16px; background:none; border:none; color:var(--foam-dim);
    font-size:20px; cursor:pointer;
  }

  /* detail sheet month grid */
  .month-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:14px 0;}
  .month-cell{
    border:1px solid var(--line); border-radius:8px; padding:9px 6px; text-align:center; cursor:pointer;
    background:rgba(237,230,214,0.04);
  }
  .month-cell.paid{background:rgba(201,164,76,0.18); border-color:var(--brass);}
  .month-cell.unpaid{background:rgba(209,84,62,0.14); border-color:var(--coral);}
  .month-cell .m{font-size:11px; color:var(--foam-dim); font-family:ui-monospace,monospace;}
  .month-cell .s{font-size:15px; margin-top:3px;}
  .detail-total{
    display:flex; justify-content:space-between; align-items:center; padding:12px 14px;
    background:rgba(0,0,0,0.15); border-radius:9px; margin:6px 0 14px;
  }
  .detail-total .k{font-size:12px; color:var(--foam-dim);}
  .detail-total .v{font-family:ui-monospace,monospace; font-weight:700; font-size:18px;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--brass); color:var(--navy-deep); padding:10px 18px; border-radius:20px;
    font-size:13px; font-weight:700; z-index:100; opacity:0; transition:opacity 0.25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="anchor-mark">⚓</div>
    <div class="eyebrow">Cadastro de mapas de bordo</div>
    <h1>Gestão de Pagamentos</h1>
    <div class="subtitle">Controle mensal das embarcações — R$ 60/mês</div>
  </header>

  <div class="dash" id="dash"></div>

  <div class="toolbar">
    <input class="search" id="search" placeholder="Buscar embarcação ou proprietário...">
    <button class="new-btn" id="btnNew">+</button>
  </div>

  <div id="list"></div>
</div>

<!-- Modal: novo/editar cliente -->
<div class="overlay" id="overlayForm">
  <div class="sheet">
    <button class="close-x" id="closeForm">✕</button>
    <h2 id="formTitle">Nova embarcação</h2>
    <div class="field">
      <label>Nome da embarcação</label>
      <input id="fEmbarcacao" placeholder="Ex: Estrela do Mar">
    </div>
    <div class="field">
      <label>Proprietário</label>
      <input id="fProprietario" placeholder="Nome do proprietário">
    </div>
    <div class="row2">
      <div class="field">
        <label>Telefone</label>
        <input id="fTelefone" placeholder="(84) 9....">
      </div>
      <div class="field">
        <label>Valor mensal (R$)</label>
        <input id="fValor" type="number" value="60">
      </div>
    </div>
    <div class="field">
      <label>Início da cobrança</label>
      <input id="fInicio" type="month">
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="btnCancelForm">Cancelar</button>
      <button class="btn primary" id="btnSaveForm">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: detalhe do cliente -->
<div class="overlay" id="overlayDetail">
  <div class="sheet">
    <button class="close-x" id="closeDetail">✕</button>
    <h2 id="detTitle">Embarcação</h2>
    <div class="subtitle" id="detOwner" style="margin-bottom:12px;"></div>
    <div class="detail-total">
      <div>
        <div class="k">Situação</div>
        <div class="v" id="detStatus">—</div>
      </div>
      <div style="text-align:right;">
        <div class="k">Total em atraso</div>
        <div class="v" id="detDebt">R$ 0</div>
      </div>
    </div>
    <div class="subtitle" style="margin-bottom:4px;">Toque no mês para marcar pago / pendente</div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="sheet-actions">
      <button class="btn ghost" id="btnEditClient">Editar</button>
      <button class="btn danger" id="btnDeleteClient">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MESES_ABREV = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function monthLabel(key){
  const [y,m] = key.split('-');
  return MESES_ABREV[parseInt(m,10)-1] + '/' + y.slice(2);
}
function monthsBetween(start, end){
  const [sy,sm] = start.split('-').map(Number);
  const [ey,em] = end.split('-').map(Number);
  const out = [];
  let y=sy, m=sm;
  while(y < ey || (y===ey && m<=em)){
    out.push(y + '-' + String(m).padStart(2,'0'));
    m++; if(m>12){m=1; y++;}
  }
  return out;
}
function fmtBRL(v){
  return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}

let clientes = [];
let currentDetailId = null;
let editingId = null;

async function loadClientes(){
  try{
    const idx = await window.storage.list('cliente:', false);
    const keys = idx && idx.keys ? idx.keys : [];
    const results = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, false);
        if(r && r.value) results.push(JSON.parse(r.value));
      }catch(e){}
    }
    clientes = results.sort((a,b)=> a.embarcacao.localeCompare(b.embarcacao));
  }catch(e){
    clientes = [];
  }
  render();
}

async function saveCliente(c){
  await window.storage.set('cliente:' + c.id, JSON.stringify(c), false);
}
async function deleteClienteStorage(id){
  await window.storage.delete('cliente:' + id, false);
}

function clienteDebt(c){
  const cur = currentMonthKey();
  const months = monthsBetween(c.dataInicio, cur);
  let devido = 0, pendentes = 0;
  months.forEach(mk=>{
    const pago = c.pagamentos && c.pagamentos[mk];
    if(!pago){ devido += Number(c.valorMensal || 60); pendentes++; }
  });
  return {devido, pendentes};
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

function render(){
  renderDash();
  renderList();
}

function renderDash(){
  const cur = currentMonthKey();
  let pagosEsteMes = 0, totalRecebidoMes = 0, totalDevido = 0, devendo = 0;
  clientes.forEach(c=>{
    if(c.pagamentos && c.pagamentos[cur]){
      pagosEsteMes++; totalRecebidoMes += Number(c.valorMensal||60);
    }
    const {devido} = clienteDebt(c);
    if(devido>0){ totalDevido += devido; devendo++; }
  });
  const dash = document.getElementById('dash');
  dash.innerHTML = `
    <div class="dcard">
      <div class="label">Recebido este mês</div>
      <div class="value">${fmtBRL(totalRecebidoMes)}</div>
      <div class="sub">${pagosEsteMes} de ${clientes.length} embarcações</div>
    </div>
    <div class="dcard alert">
      <div class="label">Em atraso</div>
      <div class="value">${fmtBRL(totalDevido)}</div>
      <div class="sub">${devendo} embarcação(ões) devendo</div>
    </div>
  `;
}

function renderList(){
  const list = document.getElementById('list');
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const filtered = clientes.filter(c=>
    c.embarcacao.toLowerCase().includes(q) || (c.proprietario||'').toLowerCase().includes(q)
  );

  if(clientes.length === 0){
    list.innerHTML = `<div class="empty"><div class="big">🦞</div>Nenhuma embarcação cadastrada ainda.<br>Toque em "+" para adicionar a primeira.</div>`;
    return;
  }
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">Nenhum resultado para "${q}".</div>`;
    return;
  }

  const cur = currentMonthKey();
  list.innerHTML = filtered.map(c=>{
    const {devido, pendentes} = clienteDebt(c);
    const emDia = devido === 0;
    // last up to 8 months strip
    const months = monthsBetween(c.dataInicio, cur).slice(-8);
    const knots = months.map(mk=>{
      const pago = c.pagamentos && c.pagamentos[mk];
      const cls = pago ? 'paid' : 'unpaid';
      return `<div class="knot ${cls}" title="${monthLabel(mk)}"></div>`;
    }).join('');
    return `
      <div class="client-card" data-id="${c.id}">
        <div class="client-top">
          <div>
            <div class="client-name">${escapeHtml(c.embarcacao)}</div>
            <div class="client-owner">${escapeHtml(c.proprietario||'')}</div>
          </div>
          <div class="badge ${emDia?'ok':'debt'}">${emDia ? 'Em dia' : fmtBRL(devido)}</div>
        </div>
        <div class="tide">${knots}</div>
        <div class="tide-labels"><span>${monthLabel(months[0])}</span><span>${monthLabel(months[months.length-1])}</span></div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.client-card').forEach(card=>{
    card.addEventListener('click', ()=> openDetail(card.dataset.id));
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ===== Form modal ===== */
document.getElementById('btnNew').addEventListener('click', ()=> openForm());
document.getElementById('closeForm').addEventListener('click', closeForm);
document.getElementById('btnCancelForm').addEventListener('click', closeForm);

function openForm(client){
  editingId = client ? client.id : null;
  document.getElementById('formTitle').textContent = client ? 'Editar embarcação' : 'Nova embarcação';
  document.getElementById('fEmbarcacao').value = client ? client.embarcacao : '';
  document.getElementById('fProprietario').value = client ? client.proprietario : '';
  document.getElementById('fTelefone').value = client ? (client.telefone||'') : '';
  document.getElementById('fValor').value = client ? client.valorMensal : 60;
  document.getElementById('fInicio').value = client ? client.dataInicio : currentMonthKey();
  document.getElementById('overlayForm').classList.add('show');
}
function closeForm(){
  document.getElementById('overlayForm').classList.remove('show');
}

document.getElementById('btnSaveForm').addEventListener('click', async ()=>{
  const embarcacao = document.getElementById('fEmbarcacao').value.trim();
  const proprietario = document.getElementById('fProprietario').value.trim();
  const telefone = document.getElementById('fTelefone').value.trim();
  const valorMensal = Number(document.getElementById('fValor').value) || 60;
  const dataInicio = document.getElementById('fInicio').value || currentMonthKey();

  if(!embarcacao){ showToast('Informe o nome da embarcação'); return; }

  if(editingId){
    const c = clientes.find(x=>x.id===editingId);
    c.embarcacao = embarcacao; c.proprietario = proprietario; c.telefone = telefone;
    c.valorMensal = valorMensal; c.dataInicio = dataInicio;
    await saveCliente(c);
    showToast('Dados atualizados');
  } else {
    const novo = {
      id: 'c' + Date.now() + Math.random().toString(36).slice(2,7),
      embarcacao, proprietario, telefone, valorMensal, dataInicio,
      pagamentos: {}
    };
    clientes.push(novo);
    await saveCliente(novo);
    showToast('Embarcação cadastrada');
  }
  closeForm();
  render();
});

/* ===== Detail modal ===== */
document.getElementById('closeDetail').addEventListener('click', ()=>{
  document.getElementById('overlayDetail').classList.remove('show');
});

function openDetail(id){
  currentDetailId = id;
  const c = clientes.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('detTitle').textContent = c.embarcacao;
  document.getElementById('detOwner').textContent = c.proprietario || '';
  renderDetail(c);
  document.getElementById('overlayDetail').classList.add('show');
}

function renderDetail(c){
  const cur = currentMonthKey();
  const {devido} = clienteDebt(c);
  document.getElementById('detStatus').textContent = devido===0 ? 'Em dia' : 'Devendo';
  document.getElementById('detStatus').style.color = devido===0 ? 'var(--brass)' : 'var(--coral)';
  document.getElementById('detDebt').textContent = fmtBRL(devido);

  const months = monthsBetween(c.dataInicio, cur);
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = months.slice().reverse().map(mk=>{
    const pago = c.pagamentos && c.pagamentos[mk];
    return `
      <div class="month-cell ${pago?'paid':'unpaid'}" data-m="${mk}">
        <div class="m">${monthLabel(mk)}</div>
        <div class="s">${pago?'✓':'✕'}</div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.month-cell').forEach(cell=>{
    cell.addEventListener('click', async ()=>{
      const mk = cell.dataset.m;
      c.pagamentos = c.pagamentos || {};
      c.pagamentos[mk] = !c.pagamentos[mk];
      await saveCliente(c);
      renderDetail(c);
      render();
    });
  });
}

document.getElementById('btnEditClient').addEventListener('click', ()=>{
  const c = clientes.find(x=>x.id===currentDetailId);
  document.getElementById('overlayDetail').classList.remove('show');
  openForm(c);
});

document.getElementById('btnDeleteClient').addEventListener('click', async ()=>{
  const c = clientes.find(x=>x.id===currentDetailId);
  if(!c) return;
  if(!confirm(`Excluir "${c.embarcacao}"? Esta ação não pode ser desfeita.`)) return;
  await deleteClienteStorage(c.id);
  clientes = clientes.filter(x=>x.id!==c.id);
  document.getElementById('overlayDetail').classList.remove('show');
  render();
  showToast('Embarcação removida');
});

document.getElementById('search').addEventListener('input', renderList);

/* init */
loadClientes();
</script>
</body>
</html>
